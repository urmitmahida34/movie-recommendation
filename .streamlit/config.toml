[theme]
base = "dark"
primaryColor = "#E50914"
backgroundColor = "#0F0F0F"
secondaryBackgroundColor = "#1A1A1A"
textColor = "#FFFFFF"
font = "sans serif"

[server]
# headless = true skips Streamlit's first-run email prompt. With it false,
# a cloud deploy blocks on that prompt (no stdin) and the server never starts.
headless = true

[browser]
gatherUsageStats = false
